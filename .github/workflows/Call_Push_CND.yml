name: Call Push CND

on:
  workflow_call:
  workflow_dispatch:

env:
  url: https://cnd:${{ secrets.TOKEN_CND }}@cnb.cool/3wlh/Script
   
jobs:
  jod_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        
        
      - name: Push CND
        run: |  
          rm -fr .git
          git config --global user.email "3wlh[bot]@3wlh.lh"
          git config --global user.name "3wlh[bot]"
          
          git clone --depth=1 ${url} $(pwd)
          git add -A
          Emoji=("🎉" "🤞" "✨" "🎁" "🎈" "🎄" "🎨" "💋" "🍓" "🍕" "🍉" "💐" "🌴" "🚀" "🛸" "🗽" "⛅" "🌈" "🔥" "⛄" "🐶" "🏅" "🦄" "🐤")
          git commit -am "${Emoji[$[$RANDOM % ${#Emoji[@]}]]} update $(date +%Y-%m-%d" "%H:%M:%S)"
          git push origin main